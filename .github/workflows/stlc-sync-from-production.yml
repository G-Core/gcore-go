name: Sync from production

# The other half of the promote loop: pull production's commits — release-please's
# version/changelog bumps, and any contributions merged on production — back onto
# staging `main`, so the next `stlc build` reseals against the released state.
# Runs on the staging repo, on a schedule, and reuses the same SDK_PROD_WRITE_TOKEN
# the promote workflow already needs (production stays reference-free — staging pulls).
on:
  schedule:
    # A poll, not a release — tune to how often releases/contributions land on
    # production. Every few hours is plenty; daily is fine.
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write       # push the back-sync branch on staging
  pull-requests: write  # open/merge the back-sync PR on staging

concurrency:
  group: stlc-sync-from-production
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # Canonical staging repo on the upstream only (never forks/prod).
    if: github.repository == 'G-Core/gcore-go-staging'
    env:
      PRODUCTION_REPO: G-Core/gcore-go
      PRODUCTION_REPO_TOKEN: ${{ secrets.SDK_PROD_WRITE_TOKEN }}
      # The built-in token writes the branch + PR on this (staging) repo.
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out staging
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch production main
        run: |
          git remote add production \
            "https://x-access-token:${PRODUCTION_REPO_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch production main

      - name: Check whether production has content staging lacks
        id: diff
        run: |
          # Inverse of the promote guard, by content not commit SHA: would
          # merging production into staging change staging's tree? If not,
          # staging already has production's content — nothing to pull back.
          MERGED=$(git merge-tree --write-tree origin/main production/main) || MERGED=conflict
          STAGING_TREE=$(git rev-parse 'origin/main^{tree}')
          if [ "$MERGED" = "$STAGING_TREE" ]; then
            echo "Staging already has production's content. Nothing to pull back."
            echo "behind=false" >> "$GITHUB_OUTPUT"
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push production main to the back-sync branch on staging
        if: steps.diff.outputs.behind == 'true'
        run: git push origin production/main:refs/heads/stlc/from-prod --force

      - name: Open or update the back-sync PR on staging
        if: steps.diff.outputs.behind == 'true'
        run: |
          EXISTING_PR=$(gh pr list --head stlc/from-prod --base main --state open --json number --jq '.[0].number')
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --base main \
              --head stlc/from-prod \
              --title "Sync release changes from production" \
              --body "Pulls production's release-please commits (and any merged contributions) back onto staging \`main\` so the next \`stlc build\` reseals against the released state. Bot-authored; squash-merge to keep \`main\` linear."
          fi
          # Squash keeps staging main linear and collapses the prod delta to one
          # commit. Content parity is the goal — SHAs already diverge (prod
          # rebase-merges the promote PR + release-please adds prod-only commits),
          # and the guards compare by content via `git merge-tree`. Rebase-merge
          # is unfit here: the back-sync branch carries rebased duplicates of
          # staging's own commits, so replaying them conflicts / yields empty
          # commits. Merge commits and auto-merge are both disabled on this repo,
          # so this squash-merges immediately, else leaves the PR for a manual one.
          gh pr merge stlc/from-prod --squash \
            || echo "Could not merge automatically — squash-merge the back-sync PR manually."
